name: Stale Branch Monitor and Delete after Warning

on:
  workflow_dispatch:
  schedule:
    - cron: "30 9-17 * * *"

jobs:
  scan-branches:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Git safe directory fix
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Ensure JSON file exists
        run: |
          mkdir -p .github
          if [ ! -f .github/stale-branches.json ] || [ ! -s .github/stale-branches.json ]; then
            echo "{}" > .github/stale-branches.json
          fi

      - name: Scan and update stale branches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Starting branch scan..."

          DAYS=30
          THRESHOLD=$(date -d "$DAYS days ago" +%s)
          PROTECTED_BRANCHES="main develop stage uat feature"
          FILE=".github/stale-branches.json"

          BRANCHES=$(git for-each-ref --format='%(refname:short)' refs/remotes/origin)

          for BRANCH in $BRANCHES; do
            BRANCH=${BRANCH#origin/}

            echo "----------------------------------"
            echo "Processing branch: $BRANCH"

            if echo "$PROTECTED_BRANCHES" | grep -wq "$BRANCH"; then
              echo "Skipping protected: $BRANCH"
              continue
            fi

            # FIX: prevent exit 1 by using safe jq check
            WARNED=$(jq -r --arg b "$BRANCH" 'has($b)' "$FILE" 2>/dev/null || echo "false")

            if [[ "$WARNED" == "true" ]]; then
              echo "$BRANCH already warned. Skipping."
              continue
            fi

            LAST_COMMIT=$(git log -1 --pretty="%ct" "origin/$BRANCH" 2>/dev/null || echo 0)

            if [ "$LAST_COMMIT" -gt "$THRESHOLD" ]; then
              echo "Branch active → skip"
              continue
            fi

            echo "Stale branch detected → creating issue..."

            ENCODED_BRANCH=$(printf '%s' "$BRANCH" | jq -sRr @uri)

            # FIX: added quotes so branch names resolve correctly
            CREATOR_GH_USERNAME=$(gh api "repos/${{ github.repository }}/commits/$ENCODED_BRANCH" --jq '.author.login')

            ISSUE_BODY="Branch **$BRANCH** has not received any commits recently and may be stale."
            ISSUE_URL=$(gh issue create \
              --repo "${{ github.repository }}" \
              --title "⚠ Stale Branch Warning: $BRANCH" \
              --body "$ISSUE_BODY" \
              --assignee "$CREATOR_GH_USERNAME")

            echo "Created issue: $ISSUE_URL"

            UPDATED_AT=$(date +%Y-%m-%dT%H:%M:%S)

            # FIX: always write safely to a temp file
            jq --arg br "$BRANCH" \
               --arg detected "$UPDATED_AT" \
               '.[$br] = { "first_detected": $detected }' \
               "$FILE" > "$FILE.tmp"

            mv "$FILE.tmp" "$FILE"

            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add "$FILE"

            # FIX: prevent workflow from failing when no changes
            git commit -m "Update stale branch info for $BRANCH" || echo "No changes to commit"

            git push origin main || echo "Nothing to push"

          done
          echo "Branch scan completed. Deleting branch already warned before warning period."
      - name: Cleanup already warned branches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FILE=".github/stale-branches.json"
          WARNING_PERIOD_DAYS=1

          WARNED_BRANCHES=$(jq -r 'keys[]' "$FILE")

          for BRANCH in $WARNED_BRANCHES; do
            echo "Checking warned branch: $BRANCH"

            WARNED_DATE=$(jq -r --arg b "$BRANCH" '.[$b].first_detected // empty' "$FILE")
            [[ -z "$WARNED_DATE" ]] && continue

            WARNED_TS=$(date -d "$WARNED_DATE" +%s)
            THRESHOLD_TS=$(date -d "$WARNING_PERIOD_DAYS days ago" +%s)

            if ! git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
              echo "⚠️ Branch '$BRANCH' found in JSON but does NOT exist on GitHub."
              echo "Cleaning JSON entry..."

              # Remove from JSON
              jq "del(.\"$BRANCH\")" "$FILE" > "$FILE.tmp"
              mv "$FILE.tmp" "$FILE"

              # Commit cleanup
              git add "$FILE"
              git commit -m "Removed non-existent branch $BRANCH from tracking file" || echo "No changes"
              git push origin main || echo "Nothing to push"

              continue
            fi

            # Encode branch
            ENCODED_BRANCH=$(printf '%s' "$BRANCH" | jq -sRr @uri)

            # Get last commit SHA of branch
            LAST_COMMIT_SHA=$(gh api \
              "repos/${{ github.repository }}/branches/$ENCODED_BRANCH" \
              --jq '.commit.sha' 2>/dev/null || echo "")

            if [[ -z "$LAST_COMMIT_SHA" || "$LAST_COMMIT_SHA" == "null" ]]; then
              echo "⚠ Branch $BRANCH does not exist on GitHub (404). Treating as stale with NO new commits."
              LATEST_COMMIT_TS=0
            else            
            # Branch exists → fetch commit timestamp
            LATEST_COMMIT_DATE=$(gh api \
              "repos/${{ github.repository }}/commits/$LAST_COMMIT_SHA" \
              --jq '.commit.committer.date')

            LATEST_COMMIT_TS=$(date -d "$LATEST_COMMIT_DATE" +%s)
            fi

            # =============================================
            #  CONDITION 2: Warned LESS than X days → skip
            # =============================================
            if [[ "$WARNED_TS" -ge "$THRESHOLD_TS" ]]; then
              echo "⏳ $BRANCH warned less than $WARNING_PERIOD_DAYS days ago → skipping"
              continue
            fi

            # =============================================
            #  CONDITION 1.1: New commits after warning → keep branch, remove from JSON
            # =============================================
            if [[ "$LATEST_COMMIT_TS" -gt "$WARNED_TS" ]]; then
              echo "✅ $BRANCH has new commits after warning → not stale anymore"

              # Remove from JSON
              jq "del(.\"$BRANCH\")" "$FILE" > "$FILE.tmp"
              mv "$FILE.tmp" "$FILE"

              git config user.name "github-actions"
              git config user.email "github-actions@github.com"

              git add "$FILE"
              git commit -m "Branch $BRANCH updated after warning — removed from tracking" || echo "No changes"
              git push origin main || echo "Nothing to push"

              continue
            fi

            # =============================================
            #  CONDITION 1.2: No new commits → delete branch
            # =============================================
            echo "⚠ $BRANCH is stale and past warning period → deleting branch..."

            gh api -X DELETE \
              "repos/${{ github.repository }}/git/refs/heads/$ENCODED_BRANCH" \
              || echo "Failed to delete branch via API"

            AUTHOR=$(gh api \
              "repos/${{ github.repository }}/commits/$LAST_COMMIT_SHA" \
              --jq '.author.login' 2>/dev/null || echo "${{ github.actor }}")

            gh issue create \
              --repo "${{ github.repository }}" \
              --title "⚠ Stale Branch Deleted: $BRANCH" \
              --body "Branch **$BRANCH** received no updates after warning and has been deleted." \
              --assignee "$AUTHOR"

            # Remove from JSON
            jq "del(.\"$BRANCH\")" "$FILE" > "$FILE.tmp"
            mv "$FILE.tmp" "$FILE"

            git config user.name "github-actions"
            git config user.email "github-actions@github.com"

            git add "$FILE"
            git commit -m "Deleted stale branch $BRANCH and removed from tracking" || echo "No changes"
            git push origin main || echo "Nothing to push"

          done
