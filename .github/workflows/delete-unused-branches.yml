name: Delete ONE Stale Branch (TEST)

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  delete-one:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq & swaks
        run: |
          sudo apt-get update
          sudo apt-get install -y jq swaks

      - name: Load stale file
        run: |
          [[ -f .github/stale-branches.json ]] || echo "{}" > .github/stale-branches.json

      - name: Delete ONLY Branch_test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          DEFAULT_EMAIL: "connect2ilife@gmail.com"
          TARGET_BRANCH: "Branch_test"
        run: |
          # Check if branch exists in JSON
          EXISTS=$(jq -r --arg b "$TARGET_BRANCH" 'has($b)' .github/stale-branches.json)

          if [[ "$EXISTS" != "true" ]]; then
            echo "Branch $TARGET_BRANCH not found in stale-branches.json. Exiting."
            exit 0
          fi

          echo "Processing delete for branch: $TARGET_BRANCH"

          ENCODED_BRANCH=$(printf '%s' "$TARGET_BRANCH" | jq -sRr @uri)

          # Get creator email
          CREATOR=$(gh api repos/${{ github.repository }}/branches/$ENCODED_BRANCH --jq '.commit.committer.email' || echo "")

          if [[ -z "$CREATOR" || "$CREATOR" == "null" ]]; then
            CREATOR="$DEFAULT_EMAIL"
          fi

          echo "Deleting stale branch: $TARGET_BRANCH"

          # Delete branch from GitHub
          gh api -X DELETE repos/${{ github.repository }}/git/refs/heads/$ENCODED_BRANCH || \
            echo "Warning: Failed to delete branch $TARGET_BRANCH"

          echo "Deleted branch '$TARGET_BRANCH', notifying '$CREATOR'"

          # Send email notification
          swaks --to "$CREATOR" \
                --from "buildprocure@gmail.com" \
                --server smtp.gmail.com:587 \
                --auth LOGIN \
                --auth-user "$SMTP_USER" \
                --auth-password "$SMTP_PASS" \
                --tls \
                --header "Subject: ⚠ Branch Deleted: $TARGET_BRANCH" \
                --body "The branch '$TARGET_BRANCH' has been deleted intentionally for testing."

          # Remove only this branch from stale-branches.json
          jq --arg b "$TARGET_BRANCH" 'del(.[$b])' .github/stale-branches.json > temp.json
          mv temp.json .github/stale-branches.json

      - name: Commit updated tracking file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .github/stale-branches.json
          git commit -m "Removed $TARGET_BRANCH from stale-tracking after test delete" || true
          git push
