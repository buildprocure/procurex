name: Delete Stale Branches

on:
  schedule: 
    - cron: "45 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  delete-stale:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq & swaks
        run: |
          sudo apt-get update
          sudo apt-get install -y jq swaks

      - name: Load stale file
        run: |
          [[ -f .github/stale-branches.json ]] || echo "{}" > .github/stale-branches.json

      - name: Process deletions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_EMAIL: "connect2ilife@gmail.com"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}

        run: |
          NOW=$(date +%s)
          NEWDATA="{}"

          for BRANCH in $(jq -r 'keys[]' .github/stale-branches.json); do
            WARNED_AT=$(jq -r --arg b "$BRANCH" '.[$b].warned_at' .github/stale-branches.json)
            ELAPSED=$(( NOW - WARNED_AT ))

            ENCODED_BRANCH=$(printf '%s' "$BRANCH" | jq -sRr @uri)

            # ---- 1️⃣ Not 7 days yet → keep tracking ----
            if (( ELAPSED < 604800 )); then
              NEWDATA=$(echo "$NEWDATA" | jq --arg b "$BRANCH" --argjson ts "$WARNED_AT" '.[$b]={warned_at:$ts}')
              continue
            fi

            # ---- 2️⃣ Check if branch received new commits ----
            LAST_COMMIT=$(gh api repos/${{ github.repository }}/commits/$ENCODED_BRANCH --jq '.commit.committer.date')
            LAST_TS=$(date -d "$LAST_COMMIT" +%s)

            if (( LAST_TS > WARNED_AT )); then
              echo "Skipping deletion: $BRANCH has new commits. Removing from stale tracking."
              continue # DO NOT add it back to NEWDATA
            fi

            # ---- 3️⃣ Skip if PR exists (branch is in active use) ----
            PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[].number')
            if [[ ! -z "$PR" ]]; then
              echo "Skipping deletion: $BRANCH has an open PR. Removing from stale tracking."
              continue  # DO NOT keep tracking
            fi

            # ---- 4️⃣ Get creator email ----
            CREATOR=$(gh api repos/${{ github.repository }}/branches/$ENCODED_BRANCH --jq '.commit.committer.email')
            if [[ -z "$CREATOR" || "$CREATOR" == "null" ]]; then
              CREATOR="$DEFAULT_EMAIL"
            fi

            # ---- 5️⃣ Delete branch ----
            echo "Deleting stale branch: $BRANCH"
            gh api -X DELETE repos/${{ github.repository }}/git/refs/heads/$ENCODED_BRANCH

            # ---- 6️⃣ Email notification ----
            swaks --to "$CREATOR" \
                  --from "$SMTP_USER" \
                  --server smtp.gmail.com:587 \
                  --auth LOGIN \
                  --auth-user "$SMTP_USER" \
                  --auth-password "$SMTP_PASS" \
                  --tls \
                  --header "Subject: ⚠ Branch Deleted: $BRANCH" \
                  --body "The branch '$BRANCH' was deleted from the ${{ github.repository }} repo due to inactivity."

          done

          echo "$NEWDATA" > .github/stale-branches.json

      - name: Commit updates
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .github/stale-branches.json
          git commit -m "Updated stale tracking" || true
          git push
