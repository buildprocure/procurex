name: Agent PR Review

on:
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  agent-review:
    if: >
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/agent-review')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse PR info
        id: pr
        run: |
          echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          echo "repo=${{ github.event.repository.name }}" >> $GITHUB_OUTPUT
          echo "owner=${{ github.repository_owner }}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run agent review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ steps.pr.outputs.owner }}
          GITHUB_REPO: ${{ steps.pr.outputs.repo }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          python .github/scripts/agent_review.py