name: Agent PR Review

on:
  issue_comment:
    types: [created, edited]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  debug-comment:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.issue.pull_request != null }}
    runs-on: ubuntu-latest

    steps:
      - name: Debug event
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "comment_body=${{ github.event.comment.body }}"
          echo "issue_number=${{ github.event.issue.number }}"
          echo "is_pr=${{ github.event.issue.pull_request != null }}"

      - name: Command detected
        if: ${{ github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/agent-review') }}
        run: echo "Agent review command detected"