name: Agent PR Review

on:
  issue_comment:
    types: [created, edited]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  agent-review:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.issue.pull_request != null &&
        startsWith(github.event.comment.body, '/agent-review')
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check token permissions
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Actor: ${{ github.actor }}"
          echo "Event: ${{ github.event_name }}"
      
      - name: Check PAT presence
        run: |
          [ -n "${{ secrets.AGENT_REVIEW_CLASSIC_PAT }}" ] && echo "AGENT_REVIEW_CLASSIC_PAT present" || echo "AGENT_REVIEW_CLASSIC_PAT missing"
          
      - name: Run agent review
        env:
          GITHUB_TOKEN: ${{ secrets.AGENT_REVIEW_CLASSIC_PAT }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.issue.number }}
          MCP_AGENT_REVIEW_URL: http://143.198.64.132:3011/agent-review
        run: |
          python .github/scripts/agent_review.py