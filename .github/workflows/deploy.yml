name: Build and Deploy to GHCR

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_NAME: ${{ github.event.repository.name }}   # 👈 dynamic (procurex)
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # --- Checkout main repo ---
      - name: Checkout main repo
        uses: actions/checkout@v4

      # --- Checkout frontend repo ---
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: buildprocure/buildhub
          path: ilife-items-frontend
          token: ${{ secrets.GH_PAT }}

      # --- Checkout CSS repo ---
      - name: Checkout CSS
        uses: actions/checkout@v4
        with:
          repository: buildprocure/bp-style-css
          path: ilifes-style-css
          token: ${{ secrets.GH_PAT }}

      # --- Generate commit tags ---
      - name: Generate commit tags
        id: vars
        run: |
          APP_COMMIT_SHORT=$(echo "${GITHUB_SHA}" | cut -c1-9)

          cd ilife-items-frontend
          ITEMS_COMMIT_SHORT=$(git rev-parse --short=9 HEAD)

          cd ../ilifes-style-css
          STYLE_COMMIT_SHORT=$(git rev-parse --short=9 HEAD)

          TAG="${APP_COMMIT_SHORT}-${ITEMS_COMMIT_SHORT}-${STYLE_COMMIT_SHORT}"

          IMAGE_BASE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}"

          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "IMAGE_BASE=$IMAGE_BASE" >> $GITHUB_OUTPUT

      # --- Login to GHCR ---
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      
      # --Debug structure---
      - name: Debug structure
        run: |
          pwd
          ls -la
      # --- Copy CSS ---
      - name: Copy CSS
        run: |
          cp ilifes-style-css/global_bp.css .

      # --- Build Docker Image ---
      - name: Build Docker Image
        run: |
          docker build \
            --no-cache \
            -t ${{ steps.vars.outputs.IMAGE_BASE }}:${{ steps.vars.outputs.TAG }} \
            -t ${{ steps.vars.outputs.IMAGE_BASE }}:latest \
            -f dockerfile \
            .

      # --- Push Docker Image ---
      - name: Push Docker Images
        run: |
          docker push ${{ steps.vars.outputs.IMAGE_BASE }}:${{ steps.vars.outputs.TAG }}
          docker push ${{ steps.vars.outputs.IMAGE_BASE }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}

          script: |
            cd /var/www/html

            echo "Downloading latest docker-compose.yml..."
            curl -H "Authorization: token $GH_PAT" https://raw.githubusercontent.com/buildprocure/procurex/main/docker-compose.yml -o docker-compose.yml

            echo "Setting correct ownership for docker-compose.yml..."
            chown root:root docker-compose.yml

            echo "Logging into GHCR..."
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            echo "Pulling latest images..."
            docker-compose pull

            echo "Restarting containers..."
            docker-compose down --remove-orphans
            docker-compose up -d

            echo "Cleaning old images..."
            docker image prune -f

            docker ps -a