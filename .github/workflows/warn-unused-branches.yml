name: Stale Branch Monitor and Issue Creator

on:
  workflow_dispatch:
  schedule:
    - cron: "30 9-17 * * *"

jobs:
  scan-branches:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Git safe directory fix
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Ensure JSON file exists
        run: |
          mkdir -p .github
          if [ ! -f .github/stale-branches.json ] || [ ! -s .github/stale-branches.json ]; then
            echo "{}" > .github/stale-branches.json
          fi

      - name: Scan and update stale branches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Starting branch scan..."

          DAYS=30
          THRESHOLD=$(date -d "$DAYS days ago" +%s)
          PROTECTED_BRANCHES="main develop stage uat feature"
          FILE=".github/stale-branches.json"

          BRANCHES=$(git for-each-ref --format='%(refname:short)' refs/remotes/origin)

          for BRANCH in $BRANCHES; do
            BRANCH=${BRANCH#origin/}

            echo "----------------------------------"
            echo "Processing branch: $BRANCH"

            if echo "$PROTECTED_BRANCHES" | grep -wq "$BRANCH"; then
              echo "Skipping protected: $BRANCH"
              continue
            fi

            # FIX: prevent exit 1 by using safe jq check
            WARNED=$(jq -r --arg b "$BRANCH" 'has($b)' "$FILE" 2>/dev/null || echo "false")

            if [[ "$WARNED" == "true" ]]; then
              echo "$BRANCH already warned. Skipping."
              continue
            fi

            LAST_COMMIT=$(git log -1 --pretty="%ct" "origin/$BRANCH" 2>/dev/null || echo 0)

            if [ "$LAST_COMMIT" -gt "$THRESHOLD" ]; then
              echo "Branch active → skip"
              continue
            fi

            echo "Stale branch detected → creating issue..."

            ENCODED_BRANCH=$(printf '%s' "$BRANCH" | jq -sRr @uri)

            # FIX: added quotes so branch names resolve correctly
            CREATOR_GH_USERNAME=$(gh api "repos/${{ github.repository }}/commits/$ENCODED_BRANCH" --jq '.author.login')

            ISSUE_BODY="Branch **$BRANCH** has not received any commits recently and may be stale."
            ISSUE_URL=$(gh issue create \
              --repo "${{ github.repository }}" \
              --title "⚠ Stale Branch Warning: $BRANCH" \
              --body "$ISSUE_BODY" \
              --assignee "$CREATOR_GH_USERNAME")

            echo "Created issue: $ISSUE_URL"

            UPDATED_AT=$(date +%Y-%m-%dT%H:%M:%S)

            # FIX: always write safely to a temp file
            jq --arg br "$BRANCH" \
               --arg detected "$UPDATED_AT" \
               '.[$br] = { "first_detected": $detected }' \
               "$FILE" > "$FILE.tmp"

            mv "$FILE.tmp" "$FILE"

            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add "$FILE"

            # FIX: prevent workflow from failing when no changes
            git commit -m "Update stale branch info for $BRANCH" || echo "No changes to commit"

            git push origin main || echo "Nothing to push"

          done
          echo "Branch scan completed. Deleting branch already warned before warning period."
      - name: Cleanup already warned branches
        run: |
          WARNED_DATE=$(jq -r --arg b "$BRANCH" '.[$b].first_detected // empty' "$FILE")

          if [[ -n "$WARNED_DATE" ]]; then
            WARNED_TS=$(date -d "$WARNED_DATE" +%s)
            ONE_DAY_AGO=$(date -d '1 day ago' +%s)

            # If was warned more than 1 day ago → delete branch
            if [ "$WARNED_TS" -lt "$ONE_DAY_AGO" ]; then
              echo "⚠ $BRANCH was warned 1+ day ago → deleting branch..."

              # Delete remote branch
              ENCODED_BRANCH=$(printf '%s' "$BRANCH" | jq -sRr @uri)
              gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/$ENCODED_BRANCH" || echo "Failed to delete branch via API"


              # Remove from JSON file
              jq "del(.\"$BRANCH\")" "$FILE" > "$FILE.tmp"
              mv "$FILE.tmp" "$FILE"

              # Commit JSON cleanup
              git add "$FILE"
              git commit -m "Deleted stale branch $BRANCH and removed from JSON" || echo "No changes"
              git push origin main || echo "Nothing to push"

              # Skip further processing of this branch
              continue
            fi
          fi
