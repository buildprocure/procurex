name: Stale Branch Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "30 9-17 * * *"

jobs:
  scan-branches:
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------
      # 1. CHECKOUT MAIN BRANCH (NOT JUST HEAD)
      # --------------------------------------------
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main   # <-- IMPORTANT

      # --------------------------------------------
      # 2. Git safe-directory fix
      # --------------------------------------------
      - name: Allow workflow file writes
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # --------------------------------------------
      # 3. Setup GitHub CLI
      # --------------------------------------------
      - name: Setup GitHub CLI token
        run: |
          echo "${{ github.token }}" > ~/.git_token
          export GH_TOKEN="${{ github.token }}"

      # --------------------------------------------
      # 4. Load/create JSON file
      # --------------------------------------------
      - name: Ensure stale-branches.json exists
        run: |
          mkdir -p .github
          if [ ! -f .github/stale-branches.json ]; then
            echo "{}" > .github/stale-branches.json
          fi

      # --------------------------------------------
      # 5. Scan branches + update JSON + create issues
      # --------------------------------------------
      - name: Process branches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Starting branch scan..."

          DAYS=30
          THRESHOLD=$(date -d "$DAYS days ago" +%s)

          BRANCHES=$(git for-each-ref --format='%(refname:short)' refs/remotes/origin)

          echo "$BRANCHES" | while read BRANCH; do
            BRANCH=${BRANCH#origin/}

            echo "---"
            echo "Processing branch: $BRANCH"

            LAST_COMMIT=$(git log -1 --pretty="%ct" origin/$BRANCH 2>/dev/null || echo 0)

            if [ "$LAST_COMMIT" -gt "$THRESHOLD" ]; then
              echo "Branch active recently → skip"
              continue
            fi

            echo "Stale branch detected → creating GitHub Issue…"

            # Properly encode branch names (slashes, #, spaces, etc)
            ENCODED_BRANCH=$(python3 - <<EOF
            import urllib.parse
            import os
            branch = os.environ["BRANCH"]
            print(urllib.parse.quote(branch, safe=""))
            EOF
            )


            CREATOR_GH_USERNAME=$(gh api repos/${{ github.repository }}/commits/$ENCODED_BRANCH --jq '.author.login')

            ISSUE_BODY="Branch **$BRANCH** has not received any commits recently and may be stale."
            ISSUE_URL=$(gh issue create \
              --repo ${{ github.repository }} \
              --title "⚠ Stale Branch Warning: $BRANCH" \
              --body "$ISSUE_BODY" \
              --assignee "$CREATOR_GH_USERNAME")

            echo "$ISSUE_URL"

            echo "Updating stale-branches.json for branch: $BRANCH"

            cat .github/stale-branches.json \
              | jq --arg br "$BRANCH" \
                   --arg issuedate "$(date +%Y-%m-%d)" \
                   '.[$br] = { "first_detected": $issuedate }' \
              > .github/stale-branches.tmp

            mv .github/stale-branches.tmp .github/stale-branches.json

            echo "Updated stale JSON for: $BRANCH"
          done

      # --------------------------------------------
      # 6. DEBUG – show git status + file content
      # --------------------------------------------
      - name: Debug git status & file
        run: |
          echo "======== GIT STATUS ========"
          git status
          echo "======== stale-branches.json ========"
          cat .github/stale-branches.json

      # --------------------------------------------
      # 7. Commit & push changes
      # --------------------------------------------
      - name: Commit & Push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .github/stale-branches.json

          git commit -m "Update stale branches JSON" || echo "No changes to commit"
          git push origin main || echo "Nothing to push"
