name: Warn Stale Branches

on:
  schedule:
    - cron: "30 * * * *" # Runs at minute 30 of every hour
  workflow_dispatch:

permissions:
  contents: write          # Needed to update stale-branches.json
  pull-requests: read      # Needed for gh pr list
  actions: read            # Allows calling another workflow (send-mail.yml)

jobs:
  warn-stale:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq & gh
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Ensure stale-tracking file exists
        run: |
          mkdir -p .github
          [[ -f .github/stale-branches.json ]] || echo "{}" > .github/stale-branches.json

      - name: Identify stale branches (NO EMAIL)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DAYS: 30
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          DEFAULT_EMAIL: connect2ilife@gmail.com  # Fallback email
        run: |
          THRESHOLD=$(date -d "$DAYS days ago" +%s)
          EXCLUDE="main master develop feature uat"

          for BRANCH in $(gh api repos/${{ github.repository }}/branches --jq '.[].name'); do

            # Skip protected branches
            if [[ " $EXCLUDE " =~ " $BRANCH " ]]; then
              continue
            fi

            # URL-encode branch names so / does not break GitHub API
            ENCODED_BRANCH=$(printf '%s' "$BRANCH" | jq -sRr @uri)
            
            LAST_COMMIT=$(gh api repos/${{ github.repository }}/commits/$ENCODED_BRANCH --jq '.commit.committer.date')
            LAST_TS=$(date -d "$LAST_COMMIT" +%s)

            # Skip if branch is active
            if (( LAST_TS > THRESHOLD )); then
              continue
            fi

            # Skip if a PR exists
            PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[].number')
            if [[ ! -z "$PR" ]]; then
              continue
            fi

            # Skip if already warned
            WARNED=$(jq -r --arg b "$BRANCH" '.[$b].warned_at // empty' .github/stale-branches.json)
            if [[ ! -z "$WARNED" ]]; then
              continue
            fi

            #Get the creators email of the branch
            CREATOR=$(gh api repos/${{ github.repository }}/branches/$ENCODED_BRANCH --jq '.commit.committer.email')

            if [[ -z "$CREATOR" || "$CREATOR" == "null"]]; then
              CREATOR="$DEFAULT_EMAIL"
            fi

            echo "Branch '$BRANCH' is stale. Sending warning to $CREATOR."

            # Send warning email
            gh run run-action \
              -f action=dawidd6/action-send-mail@v3 \
              -f server_address=smtp.gmail.com \
              -f server_port=587 \
              -f username="$SMTP_USER" \
              -f password="$SMTP_PASS" \
              -f from="BuildProcure <buildprocure@gmail.com>" \
              -f to="$CREATOR" \
              -f subject="⚠ Stale Branch Warning: $BRANCH" \
              -f body="The branch '$BRANCH' has been inactive for over $DAYS days. Please take action to either update or delete this branch within the next 7 days to avoid automatic deletion."


            # Update stale-tracking file
            NOW=$(date +%s)
            jq --arg b "$BRANCH" --arg ts "$NOW" \
              '.[$b] = {warned_at: $ts}' \
              .github/stale-branches.json > temp.json
            mv temp.json .github/stale-branches.json

          done

      - name: Commit stale file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .github/stale-branches.json
          git commit -m "Update stale branch warnings" || true
          git push
