name: Warn Stale Branches

on:
  schedule:
    - cron: "30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  warn-stale:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Ensure JSON file exists
        run: |
          mkdir -p .github
          [[ -f .github/stale-branches.json ]] || echo "{}" > .github/stale-branches.json
          echo "Current stale JSON:"
          cat .github/stale-branches.json

      - name: Process branches
        env:
          GH_TOKEN: ${{ github.token }}
          DAYS: 30
        run: |
          THRESHOLD=$(date -d "$DAYS days ago" +%s)
          EXCLUDE="main master develop feature uat"

          # Loop all branches
          for BRANCH in $(gh api repos/${{ github.repository }}/branches --jq '.[].name'); do
            echo "---"
            echo "Processing branch: $BRANCH"

            # Skip protected branches
            if [[ " $EXCLUDE " =~ " $BRANCH " ]]; then
              echo "Skipping protected branch."
              continue
            fi

            # URL-safe branch name
            ENCODED_BRANCH=$(printf '%s' "$BRANCH" | jq -sRr @uri)
            # JSON-safe key
            BRANCH_JSON=$(echo "$BRANCH" | sed 's/\//_/g')

            # Get last commit
            LAST_COMMIT=$(gh api repos/${{ github.repository }}/commits/$ENCODED_BRANCH --jq '.commit.committer.date')
            LAST_TS=$(date -d "$LAST_COMMIT" +%s)

            if (( LAST_TS > THRESHOLD )); then
              echo "Branch active recently → skip"
              continue
            fi

            # Skip if PR exists
            PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[].number')
            if [[ ! -z "$PR" ]]; then
              echo "Open PR exists → skip"
              continue
            fi

            # Skip if already warned
            WARNED=$(jq -r --arg b "$BRANCH_JSON" '.[$b].warned_at // empty' .github/stale-branches.json)
            if [[ ! -z "$WARNED" ]]; then
              echo "Already warned → skip"
              continue
            fi

            echo "Stale branch detected → creating GitHub Issue…"

            # Get GitHub username (author.login)
            CREATOR=$(gh api repos/${{ github.repository }}/commits/$ENCODED_BRANCH --jq '.author.login')

            if [[ -z "$CREATOR" || "$CREATOR" == "null" ]]; then
              CREATOR=""
            fi

            ISSUE_BODY="The branch **$BRANCH** has been inactive for more than **$DAYS days** in the repository **${{ github.repository }}**. Please review this branch and either update it or delete it if it's no longer needed. This is an automated stale-branch warning."

            # Create GitHub Issue
            if [[ -z "$CREATOR" ]]; then
              gh issue create \
                --repo ${{ github.repository }} \
                --title "⚠ Stale Branch Warning: $BRANCH" \
                --body "$ISSUE_BODY"
            else
              gh issue create \
                --repo ${{ github.repository }} \
                --title "⚠ Stale Branch Warning: $BRANCH" \
                --body "$ISSUE_BODY" \
                --assignee "$CREATOR"
            fi

            # Update JSON
            echo "Updating stale-branches.json for branch: $BRANCH_JSON"
            NOW=$(date +%s)
            jq --arg b "$BRANCH_JSON" --arg ts "$NOW" \
              '.[$b] = { warned_at: ($ts|tonumber) }' \
              .github/stale-branches.json > temp.json

            mv temp.json .github/stale-branches.json

            echo "Updated stale JSON for: $BRANCH_JSON"
            cat .github/stale-branches.json

          done

      - name: Commit stale JSON updates
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .github/stale-branches.json
          git commit -m "Update stale branch warnings" || echo "No changes to commit"
          git push
