name: Warn Stale Branches

on:
  schedule:
    - cron: "30 * * * *" # Runs at minute 30 of every hour
  workflow_dispatch:

permissions:
  contents: write          # Needed to update stale-branches.json
  pull-requests: read      # Needed for gh pr list
  issues: write            # Needed to create issues
  actions: read

jobs:
  warn-stale:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq & gh
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Ensure stale-tracking file exists
        run: |
          mkdir -p .github
          [[ -f .github/stale-branches.json ]] || echo "{}" > .github/stale-branches.json

      - name: Identify stale branches (via GitHub Issue Notification)
        env:
          DAYS: 30
        run: |
          THRESHOLD=$(date -d "$DAYS days ago" +%s)
          EXCLUDE="main master develop feature uat"

          for BRANCH in $(gh api repos/${{ github.repository }}/branches --jq '.[].name'); do

            # Skip protected branches
            if [[ " $EXCLUDE " =~ " $BRANCH " ]]; then
              continue
            fi

            # URL encode branch name
            ENCODED_BRANCH=$(printf '%s' "$BRANCH" | jq -sRr @uri)

            # Get last commit date
            LAST_COMMIT=$(gh api repos/${{ github.repository }}/commits/$ENCODED_BRANCH --jq '.commit.committer.date')
            LAST_TS=$(date -d "$LAST_COMMIT" +%s)

            # Skip active branches
            if (( LAST_TS > THRESHOLD )); then
              continue
            fi

            # Skip if PR exists
            PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[].number')
            if [[ ! -z "$PR" ]]; then
              continue
            fi

            # Skip if already warned
            WARNED=$(jq -r --arg b "$BRANCH" '.[$b].warned_at // empty' .github/stale-branches.json)
            if [[ ! -z "$WARNED" ]]; then
              continue
            fi

            # Get GitHub username of author
            CREATOR_GH_USERNAME=$(gh api repos/${{ github.repository }}/commits/$ENCODED_BRANCH --jq '.author.login')

            # Fallback if null (GitHub sometimes returns null)
            if [[ -z "$CREATOR_GH_USERNAME" || "$CREATOR_GH_USERNAME" == "null" ]]; then
              CREATOR_GH_USERNAME=""
            fi

            echo "Branch '$BRANCH' is stale. Creating issue for $CREATOR_GH_USERNAME."

            # Create GitHub issue (GitHub sends email automatically)
            ISSUE_BODY="The branch '$BRANCH' has been inactive for over $DAYS days in the ${{ github.repository }} repository. Please update or delete this branch within the next 7 days. If no changes occur, this branch will be deleted automatically."

            if [[ -z "$CREATOR_GH_USERNAME" ]]; then
              # No creator username found → issue without assignee
              gh issue create \
                --repo ${{ github.repository }} \
                --title "⚠ Stale Branch Warning: $BRANCH" \
                --body "$ISSUE_BODY"
            else
              # Issue assigned to creator → GitHub emails them
              gh issue create \
                --repo ${{ github.repository }} \
                --title "⚠ Stale Branch Warning: $BRANCH" \
                --body "$ISSUE_BODY" \
                --assignee "$CREATOR_GH_USERNAME"
            fi

            # Update stale-tracking JSON
            NOW=$(date +%s)
            jq --arg b "$BRANCH" --arg ts "$NOW" \
              '.[$b] = {warned_at: $ts}' \
              .github/stale-branches.json > temp.json
            mv temp.json .github/stale-branches.json

          done

      - name: Commit stale file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .github/stale-branches.json
          git commit -m "Update stale branch warnings" || true
          git push
