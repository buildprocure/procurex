name: Warn Stale Branches

on:
  schedule:
    - cron: "30 * * * *" # Runs at minute 30 of every hour
  workflow_dispatch:

permissions:
  contents: write          # Needed to update stale-branches.json
  pull-requests: read      # Needed for gh pr list
  actions: read            # Allows calling another workflow (send-mail.yml)

jobs:
  warn-stale:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq & gh
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Ensure stale-tracking file exists
        run: |
          mkdir -p .github
          [[ -f .github/stale-branches.json ]] || echo "{}" > .github/stale-branches.json

      - name: Identify stale branches & send warnings
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # keep default token for branch operations
          GH_PAT: ${{ secrets.PAT_TOKEN }}            # <-- PAT used ONLY for triggering send-mail.yml
          DAYS: 30
        run: |
          THRESHOLD=$(date -d "$DAYS days ago" +%s)
          EXCLUDE="main master develop feature uat"

          for BRANCH in $(gh api repos/${{ github.repository }}/branches --jq '.[].name'); do

            if [[ " $EXCLUDE " =~ " $BRANCH " ]]; then
              continue
            fi

            LAST_COMMIT=$(gh api repos/${{ github.repository }}/commits/$BRANCH --jq '.commit.committer.date')
            LAST_TS=$(date -d "$LAST_COMMIT" +%s)

            if (( LAST_TS > THRESHOLD )); then
              continue
            fi

            PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[].number')
            if [[ -n "$PR" ]]; then
              continue
            fi

            WARNED=$(jq -r --arg b "$BRANCH" '.[$b].warned_at // empty' .github/stale-branches.json)
            if [[ -n "$WARNED" ]]; then
              continue
            fi

            CREATOR=$(gh api repos/${{ github.repository }}/branches/$BRANCH --jq '.commit.committer.email')

            echo "Sending warning email for branch $BRANCH to $CREATOR"

            # Update stale-tracking JSON
            NOW=$(date +%s)
            jq --arg b "$BRANCH" --arg ts "$NOW" \
                '.[$b] = {warned_at: $ts}' \
                .github/stale-branches.json > temp.json
            mv temp.json .github/stale-branches.json

            # Use PAT only for triggering workflow
            export GH_TOKEN="$GH_PAT"

            gh workflow run send-mail.yml \
              -f to="$CREATOR" \
              -f subject="⚠ Stale Branch Warning: $BRANCH" \
              -f body="Branch '$BRANCH' is stale."

            # reset token back to GitHub token (good practice)
            export GH_TOKEN="$GITHUB_TOKEN"
          done

      - name: Commit stale file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .github/stale-branches.json
          git commit -m "Update stale branch warnings" || true
          git push
