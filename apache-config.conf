<VirtualHost *:80>
    ServerName buildprocure.com
    ServerAlias localhost
    Redirect permanent / https://buildprocure.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName buildprocure.com
    ServerAlias localhost
    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile /etc/apache2/ssl/buildprocure.com_combined.crt
    SSLCertificateKeyFile /etc/apache2/ssl/_.buildprocure.com_private_key.key

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Proxy PHP to FPM
    <FilesMatch "\.php$">
        SetHandler "proxy:fcgi://php-fpm:9000"
    </FilesMatch>

    # Forward HTTP header to HTTPS for SimpleSAMLphp
    RequestHeader set X-Forwarded-Proto "https"

    # Proxy SimpleSAMLphp
    ProxyPass "/simplesaml/" "http://simplesamlphp/"
    ProxyPassReverse "/simplesaml/" "http://simplesamlphp/"
</VirtualHost>
