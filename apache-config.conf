# Virtual Host for localhost (No redirection, local development)
<VirtualHost *:80>
    ServerName buildprocure.com
    ServerAlias localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/buildprocure_error.log
    CustomLog ${APACHE_LOG_DIR}/buildprocure_access.log combined
</VirtualHost>
