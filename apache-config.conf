# ============================================================
# BuildProcure unified Apache + PHP-FPM configuration
# ============================================================

# Listen on HTTPS (80 is in httpd.conf by default)
#Listen 443

# ------------------------------------------------------------
# Redirect HTTP to HTTPS
# ------------------------------------------------------------
<VirtualHost *:80>
    ServerName buildprocure.com
    Redirect permanent / https://buildprocure.com/
</VirtualHost>

# ------------------------------------------------------------
# Main HTTPS VirtualHost
# ------------------------------------------------------------
<VirtualHost *:443>
    ServerName buildprocure.com
    ServerAlias localhost

    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile "/usr/local/apache2/conf/ssl/buildprocure.com_combined.crt"
    SSLCertificateKeyFile "/usr/local/apache2/conf/ssl/_.buildprocure.com_private_key.key"

    # --------------------------------------------------------
    # Directory setup (enable .htaccess, disable indexes)
    # --------------------------------------------------------
    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php index.html
    </Directory>

    # --------------------------------------------------------
    # PHP-FPM handler (local socket)
    # --------------------------------------------------------
    <FilesMatch "\.php$">
        SetHandler "proxy:unix:/run/php/php8.2-fpm.sock|fcgi://localhost/"
    </FilesMatch>

    # --------------------------------------------------------
    # Proxy SimpleSAMLphp (external container)
    # --------------------------------------------------------
    ProxyPreserveHost On
    ProxyPass "/simplesaml/" "http://simplesamlphp/"
    ProxyPassReverse "/simplesaml/" "http://simplesamlphp/"
    ProxyPass "/sso_index.php" "http://simplesamlphp/sso_index.php"
    ProxyPassReverse "/sso_index.php" "http://simplesamlphp/sso_index.php"

    # --------------------------------------------------------
    # Logging
    # --------------------------------------------------------
    ErrorLog /var/log/apache2/buildprocure_error.log
    CustomLog /var/log/apache2/buildprocure_access.log combined

    # --------------------------------------------------------
    # Security headers
    # --------------------------------------------------------
    Header always set X-Frame-Options SAMEORIGIN
    Header always set X-Content-Type-Options nosniff

    # Forward HTTPS info for frameworks like SAML
    SetEnv HTTPS on
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}s
    RequestHeader set X-Forwarded-Proto https
    RequestHeader set X-Forwarded-Port 443
</VirtualHost>
