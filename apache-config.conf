# ============================================================
# BuildProcure Apache + PHP-FPM Configuration
# ============================================================

# --- Redirect HTTP to HTTPS ---
<VirtualHost *:80>
    ServerName buildprocure.com
    Redirect permanent / https://buildprocure.com/
</VirtualHost>

# --- Main HTTPS VirtualHost ---
<VirtualHost *:443>
    ServerName buildprocure.com

    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile "/usr/local/apache2/conf/ssl/buildprocure.com_combined.crt"
    SSLCertificateKeyFile "/usr/local/apache2/conf/ssl/_.buildprocure.com_private_key.key"

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php index.html
    </Directory>

    <FilesMatch "\.php$">
        SetHandler "proxy:fcgi://127.0.0.1:9000"
    </FilesMatch>

    ProxyPreserveHost On
    ProxyPass "/simplesamlphp/" "http://simplesamlphp:80/"
    ProxyPassReverse "/simplesamlphp/" "http://simplesamlphp:80/"

    ErrorLog /var/log/apache2/buildprocure_error.log
    CustomLog /var/log/apache2/buildprocure_access.log combined

    Header always set X-Frame-Options SAMEORIGIN
    Header always set X-Content-Type-Options nosniff

    SetEnv HTTPS on
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}s
    RequestHeader set X-Forwarded-Proto https
    RequestHeader set X-Forwarded-Port 443
    # Ensure Authorization header is passed to PHP-FPM
    SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1

</VirtualHost>
# --- Redirect hub.buildprocure.com HTTP to HTTPS ---
<VirtualHost *:80>
    ServerName hub.buildprocure.com
    Redirect permanent / https://hub.buildprocure.com/
</VirtualHost>

# --- Proxy hub.buildprocure.com to ilifes-items-frontend ---
<VirtualHost *:443>
    ServerName hub.buildprocure.com

    SSLEngine on
    # Using your existing wildcard or combined certs
    SSLCertificateFile "/usr/local/apache2/conf/ssl/buildprocure.com_combined.crt"
    SSLCertificateKeyFile "/usr/local/apache2/conf/ssl/_.buildprocure.com_private_key.key"

    ProxyPreserveHost On

    # Docker's internal DNS allows you to use the container name directly
    # because they are running on the same host/network.
    ProxyPass / http://ilifes-items-frontend:80/
    ProxyPassReverse / http://ilifes-items-frontend:80/

    # Optional: Match the SSL headers your app might expect
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ErrorLog /var/log/apache2/hub_error.log
    CustomLog /var/log/apache2/hub_access.log combined
</VirtualHost>
