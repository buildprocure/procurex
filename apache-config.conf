<VirtualHost *:80>
    ServerName buildprocure.com
    ServerAlias localhost
    Redirect permanent / https://buildprocure.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName buildprocure.com
    ServerAlias localhost
    DocumentRoot /var/www/html

    SSLEngine on

    SSLCertificateFile /etc/apache2/ssl/buildprocure.com_combined.crt
    SSLCertificateKeyFile /etc/apache2/ssl/_.buildprocure.com_private_key.key

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

# ➕ Proxy configuration for SimpleSAMLphp
ProxyPass "/simplesaml/" "http://simplesamlphp/simplesaml/"
ProxyPassReverse "/simplesaml/" "http://simplesamlphp/simplesaml/"
</VirtualHost>