trigger:
  - main

parameters:
  - name: environment
    type: string
    default: 'prod'
    values:
      - prod
      - local

variables:
  - group: style-css-branch-mapping
  - name: CSS_BRANCH
    ${{ if eq(parameters.environment, 'prod') }}:
      value: 'main'
    ${{ if eq(parameters.environment, 'local') }}:
      value: 'dev'  # or whatever your local branch name is

  - group: github-access-tokens
  - name: dockerRegistryServiceConnection
    value: 'acr-ilifes-docker-connection-v2'
  - name: imageName
    value: 'ilifes-store'
  - name: acrName
    value: 'ilifesregistry.azurecr.io'
  - name: sshServiceConnection
    value: 'ilifes-ssh-connection'
  - name: appDirectory
    value: '/var/www/html'
  - name: containerName
    value: 'ilifes_web'


resources:
  repositories:
    - repository: ilife-items-frontend
      type: github
      name: rabinkhadkaa/ilife-items-frontend
      ref: refs/heads/main
      endpoint: github.com_rabinkhadkaa

    - repository: ilife-build
      type: github
      name: rabinkhadkaa/ilife-build
      ref: refs/heads/main
      endpoint: github.com_rabinkhadkaa

    - repository: ilifes-style-css
      type: github
      name: rabinkhadkaa/ilifes-style-css
      ref: refs/heads/main
      endpoint: github.com_rabinkhadkaa


stages:
  - stage: Build
    displayName: 'Build and Push Docker Image'
    jobs:
      - job: Build
        displayName: 'Build and Push'
        #variables:
          # --- ADD THIS NEW VARIABLE ---
          # This variable will be resolved by Azure DevOps at job runtime.
          # If parameters.environment is 'prod', this becomes $(prod),
          # which then correctly resolves to 'main'.
          #resolvedCssBranch: $( ${{ parameters.environment }} ) 
          # --- END NEW VARIABLE ---

        pool:
          name: 'Default'
        steps:
          - checkout: self
          - checkout: ilife-build
          - script: |
              echo "Resolved CSS_BRANCH: $(CSS_BRANCH)"
            displayName: 'Check CSS Branch Value'


          # - template: check-mapping.yaml@ilife-build            
          #   parameters:
          #     environment: ${{ parameters.environment }}

          - checkout: ilife-items-frontend
            path: s/ilife-items-frontend


          - script: |
              echo "Pre-check: Raw parameter value: ${{ parameters.environment }}"
              echo "Pre-check: Attempting to access variable directly (should be empty here if it's the issue): $(prod)"
              echo "Pre-check: Attempting to access variable dynamically using expression: ${{ variables[parameters.environment] }}"
              echo "Pre-check: Listing all available variables (might be very verbose):"
              env | sort
            displayName: 'Debug: Pre-check Variable Resolution'

          # # --- CRITICAL CHANGE IN THIS SCRIPT BLOCK ---
          # - script: |
          #     echo "Checking out ilifes-style-css repo branch: ${{ variables.CSS_BRANCH }}"
          #     cd $(Build.SourcesDirectory)/ilifes-style-css
              
          #     # Assuming 'checkout: ilifes-style-css' handled the initial clone/auth.
          #     # If your repo is private and these commands fail, it means the
          #     # 'Classic_PAT-all-repo' endpoint isn't fully configuring git credentials
          #     # for *subsequent* script-based git commands.
          #     # In that very specific case, we'd need to re-add authentication, but differently.
          #     git fetch origin
          #     git checkout ${{ variables.CSS_BRANCH }}
          #     git pull origin ${{ variables.CSS_BRANCH }}
          #   displayName: 'Switch to CSS repo branch'
          #   # REMOVE THE 'env' BLOCK ALTOGETHER from this step
          #   env:
          #     GITHUB_TOKEN: $(System.AccessToken)
          # # --- END CRITICAL CHANGE ---
          
          # # --- MODIFIED "Switch to CSS repo branch" SCRIPT BLOCK ---
          - script: |
              echo "=== Removing leftover git extraheaders to avoid 400 errors ==="
              git config --unset-all http.https://github.com/.extraheader || true
            workingDirectory: $(Build.SourcesDirectory)/ilifes-style-css
            displayName: 'Remove Git ExtraHeaders'

          - checkout: ilifes-style-css
            path: s/ilifes-style-css
            displayName: 'Checkout ilifes-style-css repo'

          - script: |
              echo "=== Switching CSS repo to branch: $(CSS_BRANCH) ==="
              cd $(Build.SourcesDirectory)/ilifes-style-css
              
              git config user.name "Azure Pipelines"
              git remote set-url origin https://$(GITHUB_PAT)@github.com/rabinkhadkaa/ilifes-style-css.git
              git fetch origin
              git checkout $(CSS_BRANCH)
              git pull origin $(CSS_BRANCH)
            env:
              GITHUB_PAT: $(GITHUB_PAT)
            displayName: 'Switch to Dynamic CSS Branch'


          - script: |
              echo "Listing Pipeline.workspace files after checkout:"
              ls -laR $(Pipeline.Workspace)
            displayName: 'Debug: Show checked out files'


          - task: NodeTool@0
            inputs:
              versionSpec: '18.x'
            displayName: 'Install Node.js'

          - script: |
              cd $(Build.SourcesDirectory)/ilife-items-frontend
              npm install
              npm run build
            displayName: 'Build React Frontend'

            
          - script: |
              echo "Listing files after checkout:"
              ls -R $(Build.SourcesDirectory)
            displayName: 'Debug: Show checked out files'

          - script: |
              echo "Copying built frontend to ilifes/public/items-frontend"
              rm -rf $(Build.SourcesDirectory)/public/items-frontend
              mkdir -p $(Build.SourcesDirectory)/public/items-frontend
              cp -r $(Build.SourcesDirectory)/ilife-items-frontend/dist/* $(Build.SourcesDirectory)/ilife/public/items-frontend
            displayName: 'Copy React Build to Public Folder'

          - task: Docker@2
            displayName: 'Docker Login to ACR'
            inputs:
              command: login
              containerRegistry: $(dockerRegistryServiceConnection)

          - task: Docker@2
            displayName: 'Build Docker Image'
            inputs:
              command: build
              repository: $(imageName)
              dockerfile: ilife/dockerfile
              tags: latest

          - script: |
              echo "Listing files before pushing Docker image"
              ls -la $(Build.SourcesDirectory)
            displayName: "Check Source Files Before Build"

          - task: Docker@2
            displayName: 'Push Docker Image to ACR'
            inputs:
              command: push
              repository: $(imageName)
              tags: latest


  - stage: Deploy
    displayName: 'Deploy Application'
    dependsOn: Build
    jobs:
      - job: Deploy
        displayName: 'Deploy on Remote Server'
        pool:
          name: 'Default'
        steps:
          - checkout: self

          - task: SSH@0
            displayName: 'Copy docker-compose.yml to Server'
            inputs:
              sshEndpoint: $(sshServiceConnection)
              runOptions: 'commands'
              commands: |
                echo "Copying docker-compose.yml to $(appDirectory)"
                scp -i /root/.ssh/id_rsa $(Build.SourcesDirectory)/docker-compose.yml root@143.198.64.132:$(appDirectory)
                echo "Copying php-env.env to $(appDirectory)"
                scp -i /root/.ssh/id_rsa $(Build.SourcesDirectory)/php-env-${{ parameters.environment }}.env root@143.198.64.132:$(appDirectory)/php-env.env

          - task: SSH@0
            displayName: 'Debugging: List Files in Build Source Directory'
            inputs:
              sshEndpoint: $(sshServiceConnection)
              runOptions: 'commands'
              commands: |
                echo "Listing files in $(appDirectory)"
                ls -la $(appDirectory)
                echo "Listing files in $(Build.SourcesDirectory)"
                ls -la $(Build.SourcesDirectory)

          - task: Docker@2
            displayName: 'Login to ACR on Remote Server'
            inputs:
              command: login
              containerRegistry: $(dockerRegistryServiceConnection)

          - script: |
              echo "Waiting for the image to be available in ACR....and print env name: php-env-${{ parameters.environment }}.env"
              sleep 10
            displayName: 'Wait for Image Availability'

          - task: SSH@0
            displayName: 'Pull and Restart Docker Containers'
            inputs:
              sshEndpoint: $(sshServiceConnection)
              runOptions: 'commands'
              commands: |
                echo "Changing to $(appDirectory)"
                cd $(appDirectory) && ls -la

                echo "### Stopping existing containers ###"
                [ "$(docker ps -q)" ] && docker-compose -f $(appDirectory)/docker-compose.yml down 2>&1 | tee docker-compose.log || echo "No running containers to stop."

                echo "### Removing old Docker images ###"
                docker images -q $(acrName)/$(imageName):latest | grep . > /dev/null && docker rmi -f $(acrName)/$(imageName):latest || echo "No old image '$(acrName)/$(imageName):latest' to remove."

                echo "### Pulling latest image ###"
                docker pull $(acrName)/$(imageName):latest

                echo "### Starting containers with docker-compose ###"
                docker-compose -f $(appDirectory)/docker-compose.yml up -d 2>&1 | tee docker-compose.log

                echo "### Verifying running containers ###"
                docker ps -a
