trigger:
  - main

parameters:
  - name: environment
    type: string
    default: 'prod'  # Default environment is 'prod'
    values:
      - prod
      - local

variables:  
  dockerRegistryServiceConnection: 'ilifesregistry'
  imageName: 'ilifes-store'
  acrName: 'ilifesregistry.azurecr.io'
  sshServiceConnection: 'ilifes-ssh-connection'
  appDirectory: '/var/www/html'
  containerName: 'ilifes_web'

stages:
  - stage: Build
    displayName: 'Build and Push Docker Image'
    jobs:
      - job: Build
        displayName: 'Build and Push'
        pool:
          name: 'Default'
        steps:
          - checkout: self  # Check out the GitHub repository

          - task: Docker@2
            displayName: 'Login to ACR'
            inputs:
              command: login
              containerRegistry: $(dockerRegistryServiceConnection)

          - task: Docker@2
            displayName: 'Build Docker Image'
            inputs:
              command: build
              repository: $(acrName)/$(imageName)
              dockerfile: dockerfile
              tags: latest

          - script: |
              echo "Listing files before building Docker image"
              ls -la $(Build.SourcesDirectory)
            displayName: "Check Source Files Before Build"

          - task: Docker@2
            displayName: 'Push Docker Image to ACR'
            inputs:
              command: push
              repository: $(acrName)/$(imageName)
              tags: latest

  - stage: Deploy
    displayName: 'Deploy Application'
    dependsOn: Build
    jobs:
      - job: Deploy
        displayName: 'Deploy on Remote Server'
        pool:
          name: 'Default'
        steps:
          - checkout: self  # Check out the GitHub repository

          - task: SSH@0
            displayName: 'Copy docker-compose.yml to Server'
            inputs:
              sshEndpoint: $(sshServiceConnection)
              runOptions: 'commands'
              commands: |
                echo "Copying docker-compose.yml to $(appDirectory)"
                scp -i /root/.ssh/id_rsa $(Build.SourcesDirectory)/docker-compose.yml root@143.198.64.132:$(appDirectory)
          
          - task: SSH@0
            displayName: 'Debugging: List Files in App Directory'
            inputs:
              sshEndpoint: $(sshServiceConnection)
              runOptions: 'commands'
              commands: |
                echo "Listing files in $(appDirectory)"
                ls -la $(appDirectory)
                echo "Listing files in $(Build.SourcesDirectory)"
                ls -la $(build.sourcesdirectory)

          - task: Docker@2
            displayName: 'Login to ACR on Remote Server'
            inputs:
              command: login
              containerRegistry: $(dockerRegistryServiceConnection)
          
          - script: |
              echo "Waiting for the image to be available in ACR..."
              sleep 10  # Wait for 10 seconds
            displayName: 'Wait for Image Availability'

          - task: SSH@0
            displayName: 'Pull and Restart Docker Containers'
            inputs:
              sshEndpoint: $(sshServiceConnection)
              runOptions: 'commands'
              commands: |

                # copy the env file to php-env.env
                cp /var/www/html/php-env-{{ parameters.environment }}.env /var/www/html/php-env.env
                echo "Copying php-env-{{ parameters.environment }}.env to php-env.env"

                echo "Changing to $(appDirectory)"
                cd $(appDirectory) && ls -la
                echo "Listing files in $(appDirectory)"
                ls -la
                echo "Pulling latest image"
                docker pull ilifesregistry.azurecr.io/ilifesregistry.azurecr.io/ilifes-store:latest
                # Trim whitespace and make sure container_count is an integer
                container_count=$(docker ps -q | wc -l | tr -d ' ')
                echo "Container count: '$container_count'"
                
                echo "Checking whoami:"
                whoami
                echo "Checking groups:"
                groups $(whoami)
                echo "Checking Docker version:"
                docker --version || echo "Docker is not installed"

                echo "Starting containers with docker-compose"
                docker-compose -f $(appDirectory)/docker-compose.yml up -d 2>&1 | tee docker-compose.log
                
              readyTimeout: '60000'

