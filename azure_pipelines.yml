trigger:
  - main

parameters:
  - name: environment
    type: string
    default: 'prod'
    values:
      - prod
      - local
      - AB123


resources:
  repositories:
    - repository: ilife-items-frontend
      type: github
      name: rabinkhadkaa/ilife-items-frontend
      ref: refs/heads/main
      endpoint: github.com_rabinkhadkaa

    - repository: docker-build
      type: github
      name: rabinkhadkaa/buildprocure-docker-build
      ref: refs/heads/main
      endpoint: github.com_rabinkhadkaa

    - repository: ilifes-style-css
      type: github
      name: rabinkhadkaa/ilifes-style-css
      ref: $(branchRef)
      endpoint: github.com_rabinkhadkaa

    - repository: ilifes-simplesamlphp
      type: github
      name: rabinkhadkaa/ilifes-simplesamlphp
      ref: refs/heads/main
      endpoint: github.com_rabinkhadkaa


variables:
  - group: FeatureToggles
  - name: simplesamlssoEnabled
    value: $(EnableSimpleSamlPhpSSO) # Set to 'true' to enable SimpleSAMLphp SSO, 'false' to disable
  - name: SFTPEnable
    value: $(EnableSFTP) # Set to 'true' to enable SFTP, 'false' to disable
  - group: style-css-branch-mapping
  - name: DEP_ENV
    value: ${{ parameters.environment }}
  - name: branchRef
    value: $[ coalesce(variables[variables.DEP_ENV], 'develop') ]
  - group: S247_LICENSE_VARs
  - name: REPO_NAME
    value: $(Build.Repository.Name)
  - name: S24x7_LICENSE_KEY
    value: $(S247_LICENSE_KEY)
  - name: DOCKER_EXTRA_ARGS
    value: ${{format('ENV_NAME={0} REPO_NAME={1} S247_LICENSE_KEY={2}', variables.DEP_ENV, variables.REPO_NAME, variables['S24x7_LICENSE_KEY'])}}

  - group: github-access-tokens
  - name: dockerRegistryServiceConnection
    value: 'ilifes-acr-docker'
  - name: imageName
    value: 'ilifes-store'
  - name: acrName
    value: 'ilifesregistry.azurecr.io'
  - name: sshServiceConnection
    value: 'ilifes-ssh-connection'
  - name: appDirectory
    value: '/var/www/html'
  - name: dockerImageTag
    value: 'latest'
  - name: APP_COMMIT
    value: $(Build.SourceVersion)

  - name: FRONTEND_COMMIT
    value: ${{ resources.repositories['ilife-items-frontend'].commit }}

  - name: CSS_COMMIT
    value: ${{ resources.repositories['ilifes-style-css'].commit }}



stages:
  - template: azure-pipelines/build-docker-template.yaml@docker-build
    parameters:
      environment: ${{ parameters.environment }}
      dockerRegistryServiceConnection: $(dockerRegistryServiceConnection)
      sshServiceConnection: $(sshServiceConnection)
      acrName: $(acrName)
      imageName: $(imageName)
      simplesamlssoEnabled: $(EnableSimpleSamlPhpSSO)
      SFTPEnable: $(EnableSFTP)
      S247_LICENSE_KEY: $(S247_LICENSE_KEY)