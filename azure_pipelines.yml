trigger:
  - main

parameters:
  - name: environment
    type: string
    default: 'prod'
    values:
      - prod
      - local

variables:  
  dockerRegistryServiceConnection: 'ilifesregistry'
  imageName: 'ilifes-store'
  acrName: 'ilifesregistry.azurecr.io'
  sshServiceConnection: 'ilifes-ssh-connection'
  appDirectory: '/var/www/html'
  containerName: 'ilifes_web'

stages:
  - stage: Build
    displayName: 'Build and Push Docker Image'
    jobs:
      - job: Build
        displayName: 'Build and Push'
        pool:
          name: 'Default'
        steps:
          - checkout: self  

          - task: Docker@2
            displayName: 'Login to ACR'
            inputs:
              command: login
              containerRegistry: $(dockerRegistryServiceConnection)

          - task: Docker@2
            displayName: 'Build Docker Image'
            inputs:
              command: build
              repository: $(acrName)/$(imageName)
              dockerfile: dockerfile
              tags: latest

          - task: Docker@2
            displayName: 'Push Docker Image to ACR'
            inputs:
              command: push
              repository: $(acrName)/$(imageName)
              tags: latest

  - stage: Deploy
    displayName: 'Deploy Application'
    dependsOn: Build
    jobs:
      - job: Deploy
        displayName: 'Deploy on Remote Server'
        pool:
          name: 'Default'
        steps:
          - checkout: self  

          - task: SSH@0
            displayName: 'Copy docker-compose.yml to Server'
            inputs:
              sshEndpoint: $(sshServiceConnection)
              runOptions: 'commands'
              commands: |
                echo "Copying docker-compose.yml to $(appDirectory)"
                scp -i /root/.ssh/id_rsa $(Build.SourcesDirectory)/docker-compose.yml root@143.198.64.132:$(appDirectory)

          - task: SSH@0
            displayName: 'Remove Old Containers and Images'
            inputs:
              sshEndpoint: $(sshServiceConnection)
              runOptions: 'commands'
              commands: |
                echo "Stopping and removing old containers..."
                docker ps -q --filter "ancestor=$(acrName)/$(imageName)" | xargs -r docker rm -f

                echo "Removing old image..."
                docker images -q $(acrName)/$(imageName) | xargs -r docker rmi -f

          - task: SSH@0
            displayName: 'Pull and Restart Docker Containers'
            inputs:
              sshEndpoint: $(sshServiceConnection)
              runOptions: 'commands'
              commands: |
                echo "Pulling latest image..."
                docker pull $(acrName)/$(imageName):latest

                echo "Copying php-env-${{ parameters.environment }}.env to php-env.env"
                cp /var/www/html/php-env-${{ parameters.environment }}.env /var/www/html/php-env.env

                echo "Starting fresh containers..."
                cd $(appDirectory) && docker-compose up -d --force-recreate --remove-orphans
