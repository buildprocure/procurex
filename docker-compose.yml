version: "3.9"

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: '@Shova595Bhandari'
      MYSQL_DATABASE: "ilife"
    env_file:
      - php-env-prod.env
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app-network
  web:
    image: ilifesregistry.azurecr.io/ilifes-store:latest
    container_name: buildprocure
    env_file:
      - php-env-prod.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /mnt/ilifes_store/files:/var/www/html/files
      - sftp-data:/var/www/html/userUploads
      - app-uploads:/var/www/html/storage/uploads
    depends_on:
      - db
      - simplesamlphp
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: '@Shova595Bhandari'
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - app-network

  simplesamlphp:
    image: ilifesregistry.azurecr.io/simplesamlphp:latest
    container_name: simplesamlphp
    ports:
      - "8081:80"
    restart: unless-stopped
    networks:
      - app-network

  sftp:
    image: atmoz/sftp
    container_name: sftp
    ports:
      - "2222:22"
    volumes:
      - ./docker/sftp/users.conf:/etc/sftp/users.conf:ro
      - sftp-data:/var/www/html/userUploads
    environment:
      SFTP_USERS: "file:/etc/sftp/users.conf"
    networks:
      - app-network

volumes:
  db_data:
  sftp-data:
  app-uploads:

networks:
  app-network:
    driver: bridge
